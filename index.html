<!DOCTYPE html>

<html lang="ru">
	<head>
		<meta charset="UTF-8"> 
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>Заявка на отпуск</title>

		<script src="https://telegram.org/js/telegram-web-app.js"></script>
		<link rel="stylesheet" type="text/css" href="styles.css">
		<!-- <link rel="icon" href="https://i.ibb.co/prFvYNS/images-Photoroom-2.png" type="image/x-icon"> -->
	</head>

	<body>
		<div class="top">
			<h1>
				<img src="https://static.tildacdn.com/tild6539-3534-4337-b637-393164643866/icon_logo.svg" alt="Logo">
				Заполните форму, чтобы отправить заявку руководителю
			</h1>
		</div>

		<div class="container">
			<div class="main">
				<form id="vacationForm">
					<fieldset>
		        		<legend>Новая заявка</legend>

		        		<div class="form-group">
	                        <label for="startDate">Дата начала:</label>
	                        <input type="date" id="startDate" name="startDate" placeholder="Введите дату начала отпуска" required>
	                        <div class="error" id="startError">Дата начала должна быть раньше даты окончания</div>
                    	</div>

                    	<div class="form-group">
                        	<label for="endDate">Дата окончания:</label>
                        	<input type="date" id="endDate" name="endDate" placeholder="Введите дату окончания отпуска" required>
                        	<div class="error" id="endError">Дата окончания должна быть позже даты начала</div>
                    	</div>

                    	<div class="form-group">
                        	<label for="daysCount">Количество дней отпуска:</label>
                        	<input type="text" id="daysCount" readonly placeholder="Будет рассчитано автоматически">
                    	</div>

                    	<div class="form-group">
		                	<label for="comment"> Комментарий (необязательно):</label>
	                		<textarea id="comment" placeholder="Например: семейные обстоятельства"></textarea>
	                	</div>

	                	<button type="submit" class="btn-submit" id="submitBtn">Отправить заявку</button>
			    	</fieldset>	
			    </form>

			    <div id="statusMessage" class="status-message"></div>
			</div>
		</div>

		<footer>
		    <div class="footer-content">
		        <div class="messengers">
				    <p><img src="https://pngicon.ru/file/uploads/telegram.png">Telegram</p>
				    <p><img src="https://pngicon.ru/file/uploads/whatsapp.png">WhatsApp</p>
				</div>
		        <div class="footer-text">
		            <p>© 2026 г. Ярославль</p>
		            <p>Все права защищены</p>
		        </div>
		    </div>
		</footer>

		<script>

	        // Telegram Web App
	        let tg = null;
		    let chatId = null;
		    let lastName = '';

		    try {
		        if (typeof window.Telegram !== 'undefined' && window.Telegram.WebApp) {
		            tg = window.Telegram.WebApp;
		            tg.expand();
		            
		            const user = tg.initDataUnsafe?.user;
		            chatId = user?.id || null;
		        } else {
		            console.log('Запуск в обычном браузере');
		        }
		    } catch (e) {
		        console.warn('Ошибка инициализации Telegram WebApp:', e.message);
		    }

	        const startInput = document.getElementById('startDate');
	        const endInput = document.getElementById('endDate');
	        const daysInput = document.getElementById('daysCount');
	        const commentInput = document.getElementById('comment');
	        const submitBtn = document.getElementById('submitBtn');
	        const statusMsg = document.getElementById('statusMessage');

	        const today = new Date().toISOString().split('T')[0];
	        startInput.min = today;
	        endInput.min = today;

	        function calculateDays() {
		        const start = startInput.value;
		        const end = endInput.value;

		        if (start && end) {
		            const startDate = new Date(start);
		            const endDate = new Date(end);
		            const diffTime = Math.abs(endDate - startDate);
		            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
		            daysInput.value = diffDays + ' дн.';
		        } else {
		            daysInput.value = '';
		        }
		    }

	        startInput.addEventListener('input', function() {
		        if (this.value) {
		            endInput.min = this.value;
		            if (endInput.value && endInput.value < this.value) {
		                endInput.value = this.value;
		            }
		            calculateDays();
		        }
		    });

		    endInput.addEventListener('input', function() {
		        if (this.value && startInput.value && this.value < startInput.value) {
		            this.value = startInput.value;
		        }
		        calculateDays();
		    });

	        // Валидация
	        function validateForm() {
		        const start = startInput.value;
		        const end = endInput.value;
		        let isValid = true;

		        document.querySelectorAll('.error').forEach(el => el.style.display = 'none');

		        if (!start) {
		            document.getElementById('startError').textContent = 'Выберите дату начала';
		            document.getElementById('startError').style.display = 'block';
		            isValid = false;
		        } else if (start < today) {
		            document.getElementById('startError').textContent = 'Дата начала не может быть в прошлом';
		            document.getElementById('startError').style.display = 'block';
		            isValid = false;
		        }

		        if (!end) {
		            document.getElementById('endError').textContent = 'Выберите дату окончания';
		            document.getElementById('endError').style.display = 'block';
		            isValid = false;
		        } else if (end < start) {
		            document.getElementById('endError').textContent = 'Дата окончания должна быть позже даты начала';
		            document.getElementById('endError').style.display = 'block';
		            isValid = false;
		        }

		        return isValid;
		    }

	        // Отправка данных в n8n (Webhook)
	        async function submitForm() {
	            if (!validateForm()) return;

	            const payload = {
	                chat_id: chatId,
	                start_date: startInput.value,
	                end_date: endInput.value,
	                comment: commentInput.value || '',
	            };

	            submitBtn.disabled = true;
	            submitBtn.textContent = 'Отправка';
	            statusMsg.className = 'status-message';
	            statusMsg.textContent = '';
	            {{ $json.employee_id }}, {{ $json.start_date }}, {{ $json.end_date }}, {{ $json.days_used }}, {{ $json.status }}, {{ $json.comment }}
	            try {
	                // Ссылка на вебхук !!!
	                const response = await fetch('https://aiexperiment.selecty.ru/webhook/5db1e332-210e-43a9-98c6-e49d2c24f6c9', { // !!!
	                    method: 'POST',
	                    headers: {
	                        'Content-Type': 'application/json',
	                    },
	                    body: JSON.stringify(payload)
	                });

	                const result = await response.json();

	                if (response.ok) {
	                    statusMsg.className = 'status-message success';
	                    statusMsg.textContent = 'Заявка успешно отправлена!';
	                    submitBtn.textContent = 'Отправлено';
	                    
	                    if (tg) {
		                    setTimeout(() => {
		                        tg.close();
		                    }, 1500);
		                }
	                } else {
	                    throw new Error(result.message || 'Ошибка сервера');
	                }
	            } catch (error) {
	                statusMsg.className = 'status-message error';
	                statusMsg.textContent = 'Ошибка: ' + error.message;
	                submitBtn.disabled = false;
	                submitBtn.textContent = 'Попробовать снова';
	            }
	        }

	        // Обработчик отправки формы
	        document.getElementById('vacationForm').addEventListener('submit', function(e) {
	            e.preventDefault();
	            submitForm();
	        });

	        if (tg) {
		        tg.onEvent('backButtonClicked', () => {
		            tg.close();
		        });
		    }

        	console.log('Страница загружена' 'Chat ID:', chatId);
    	</script>
	</body>
</html>
